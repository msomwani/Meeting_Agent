<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetMind</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #1e2535;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .brand {
      font-size: 16px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.3px;
    }

    .tagline {
      font-size: 10px;
      color: #64748b;
      margin-top: 1px;
    }

    .body {
      padding: 16px;
    }

    /* Status indicator */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 10px 12px;
      background: #1a1f2e;
      border-radius: 8px;
      border: 1px solid #1e2535;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #334155;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .dot.idle     { background: #334155; }
    .dot.ready    { background: #22c55e; }
    .dot.recording {
      background: #ef4444;
      animation: pulse 1.2s infinite;
    }
    .dot.processing { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.done     { background: #22c55e; }
    .dot.error    { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-text {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.4;
    }

    /* Main button */
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.1px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-record {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }
    .btn-record:hover:not(:disabled) {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      transform: translateY(-1px);
    }

    .btn-stop {
      background: #ef4444;
      color: white;
    }
    .btn-stop:hover:not(:disabled) {
      background: #dc2626;
      transform: translateY(-1px);
    }

    .btn-view {
      background: #1e2535;
      color: #6366f1;
      border: 1px solid #6366f1;
      margin-top: 8px;
    }
    .btn-view:hover:not(:disabled) {
      background: #6366f1;
      color: white;
    }

    /* Timer */
    .timer {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #ef4444;
      font-variant-numeric: tabular-nums;
      margin: 12px 0;
      display: none;
    }

    .timer.visible { display: block; }

    /* Footer */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #1e2535;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-text {
      font-size: 10px;
      color: #334155;
    }

    .footer-link {
      font-size: 10px;
      color: #6366f1;
      text-decoration: none;
    }
    .footer-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">🧠</div>
    <div>
      <div class="brand">MeetMind</div>
      <div class="tagline">Local AI Meeting Notes</div>
    </div>
  </div>

  <div class="body">
    <div class="status-row">
      <div class="dot idle" id="dot"></div>
      <div class="status-text" id="statusText">Ready to record</div>
    </div>

    <div class="timer" id="timer">00:00</div>

    <button class="btn btn-record" id="mainBtn">⏺ Start Recording</button>
    <button class="btn btn-view" id="viewBtn" style="display:none">
      📄 View Report
    </button>
  </div>

  <div class="footer">
    <span class="footer-text">Audio never leaves your device</span>
    <a class="footer-link" href="http://localhost:8000/dashboard" target="_blank">Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetMind — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #080c14;
      --surface:   #0f1520;
      --border:    #1a2236;
      --accent:    #6366f1;
      --accent2:   #8b5cf6;
      --green:     #22c55e;
      --amber:     #f59e0b;
      --red:       #ef4444;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --subtle:    #1e2a3a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 24px; }

    /* ── Nav ── */
    nav {
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,20,0.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    .nav-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--green);
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      padding: 3px 8px;
      border-radius: 4px;
    }

    /* ── Hero ── */
    .hero {
      padding: 48px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .hero-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .hero-title {
      font-size: 32px;
      font-weight: 300;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .hero-title strong {
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 14px;
      color: var(--muted);
    }

    /* ── Stats row ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }

    .stat-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── Meeting cards ── */
    .meetings-list { display: flex; flex-direction: column; gap: 10px; }

    .meeting-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: border-color 0.15s, transform 0.15s;
      animation: fadeUp 0.3s ease both;
    }

    .meeting-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .card-filename {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
    }

    .card-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-summary {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .meta-pill {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .meta-pill span { color: var(--text); font-weight: 500; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
    }

    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
    .empty-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
    .empty-sub { font-size: 13px; }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
    }

    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      margin-top: 60px;
      padding: 24px 0;
      text-align: center;
    }

    .footer-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .footer-dot { color: var(--accent); margin: 0 8px; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="logo" href="/dashboard">
        <div class="logo-icon">🧠</div>
        MeetMind
      </a>
      <div class="nav-tag">● local</div>
    </div>
  </nav>

  <div class="wrap">
    <div class="hero">
      <div class="hero-label">Meeting Intelligence</div>
      <div class="hero-title">Your <strong>meeting history</strong></div>
      <div class="hero-sub">All reports generated locally — audio never leaves your device.</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="totalMeetings">—</div>
        <div class="stat-label">Total meetings</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="totalHours">—</div>
        <div class="stat-label">Hours recorded</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="totalSpeakers">—</div>
        <div class="stat-label">Avg speakers</div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">Recent meetings</div>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        Loading meetings…
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-text">
      MeetMind v1.0
      <span class="footer-dot">◆</span>
      Privacy-first
      <span class="footer-dot">◆</span>
      Open source
    </div>
  </footer>

  <script>
    const API = "http://localhost:8000";

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })
        + " · " + d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
    }

    function formatDuration(secs) {
      if (!secs) return "—";
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60);
      return m > 0 ? `${m}m ${s}s` : `${s}s`;
    }

    async function load() {
      try {
        const res = await fetch(`${API}/meetings`);
        const meetings = await res.json();

        // Stats
        document.getElementById("totalMeetings").textContent = meetings.length;
        const totalSecs = meetings.reduce((a, m) => a + (m.duration_seconds || 0), 0);
        document.getElementById("totalHours").textContent = (totalSecs / 3600).toFixed(1) + "h";
        const avgSpeakers = meetings.length
          ? (meetings.reduce((a, m) => a + (m.num_speakers || 0), 0) / meetings.length).toFixed(1)
          : "—";
        document.getElementById("totalSpeakers").textContent = avgSpeakers;

        const content = document.getElementById("content");

        if (meetings.length === 0) {
          content.innerHTML = `
            <div class="empty">
              <div class="empty-icon">🎙️</div>
              <div class="empty-title">No meetings yet</div>
              <div class="empty-sub">Start a recording in Google Meet using the MeetMind extension.</div>
            </div>`;
          return;
        }

        content.innerHTML = `<div class="meetings-list">${meetings.map((m, i) => `
          <a class="meeting-card" href="/dashboard/report.html?id=${m.meeting_id}"
             style="animation-delay:${i * 0.05}s">
            <div class="card-top">
              <div class="card-filename">${m.audio_filename}</div>
              <div class="card-date">${formatDate(m.processed_at)}</div>
            </div>
            <div class="card-summary">${m.summary_preview || "No summary available."}</div>
            <div class="card-meta">
              <div class="meta-pill">🕐 <span>${formatDuration(m.duration_seconds)}</span></div>
              <div class="meta-pill">👥 <span>${m.num_speakers || 0} speakers</span></div>
              <div class="meta-pill">⚡ <span>${m.pipeline_duration_seconds?.toFixed(1) || "—"}s pipeline</span></div>
            </div>
          </a>`).join("")}
        </div>`;

      } catch (err) {
        document.getElementById("content").innerHTML = `
          <div class="empty">
            <div class="empty-icon">⚠️</div>
            <div class="empty-title">Cannot connect to MeetMind server</div>
            <div class="empty-sub">Make sure the server is running: <code>uvicorn main:app --port 8000</code></div>
          </div>`;
      }
    }

    load();
  </script>
</body>
</html>
